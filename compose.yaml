name: ${COMPOSE_PROJECT_NAME:-vera}

services:
  postgres:
    image: pgvector/pgvector:0.8.5-pg17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vera}
      POSTGRES_USER: ${POSTGRES_USER:-vera}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local-only}
    ports:
      - "${POSTGRES_BIND_ADDRESS:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    stop_grace_period: 30s

volumes:
  postgres-data:
